schema_version = 1

[[instruments]]
"key" = "Same logical key used in Mappings. Repeat key to stack components (RSS)."
"component" = "Component name.\nExample: TC_K_Class2, NI9213_CJC, transmitter, etc."
"dist" = "Distribution of the limit:\nrect = uniform ±limit; normal = 1σ.\nRecommended: rect."
"range_min" = "Optional: apply component only if x >= range_min (in engineering unit)."
"range_max" = "Optional: apply component only if x <= range_max (in engineering unit)."
"acc_abs" = "± absolute accuracy limit in engineering unit.\nExample: ±2.5 °C -> 2.5."
"acc_pct" = "± percent-of-reading as FRACTION.\nExample: ±0.75% -> 0.0075."
"digits" = "± digits term (datasheet style). Use with lsd.\nExample: ±2 digits -> 2."
"lsd" = "Least significant digit value in engineering unit.\nExample: 0.1 °C per digit -> 0.1."
"resolution" = "Quantization step in engineering unit (optional).\nUsed as u_res = resolution/sqrt(12)."
"source" = "Norm / datasheet reference (optional)."
"notes" = "Free notes. Use to document original datasheet wording."
"setting_param" = "nan"
"setting_value" = "nan"

